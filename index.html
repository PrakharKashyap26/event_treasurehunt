<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Layered // Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="noise"></div>

<div class="container">

  <div class="terminal">

    <div class="topbar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>

      <div class="title">
        LAYERED // VAULT
      </div>
    </div>

    <div class="content">

      <div class="layer">
        LAYER 1
      </div>

      <div id="mainClue" class="main-clue">
        The machine only repeats what it hears.
      </div>

      <div id="clueArea">

      </div>

      <div class="terminal-input">

        <span>>></span>

        <input
          id="commandInput"
          type="text"
          autocomplete="off"
          spellcheck="false"
        />

      </div>

      <div id="output"></div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER: The Ghost Protocol</title>
    <!-- AETHER System Initialize -->
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="scanline"></div>
    
    <!-- first_fragment: ghost -->
    
    <audio id="ambient-audio" loop>
        <!-- Synthesized audio or placeholder for static -->
        <source src="assets/ambient.mp3" type="audio/mpeg">
    </audio>
    
    <main id="terminal">
        <header>
            <div id="status-bar">
                <span class="glitch" data-text="AETHER_OS v9.4.2">AETHER_OS v9.4.2</span>
                <span id="timer">00:00:00</span>
                <span id="level-display">L01 // INIT</span>
            </div>
        </header>

        <section id="output-container">
            <div id="story-output"></div>
            <div id="level-hints"></div>
        </section>

        <section id="input-container">
            <span class="prompt">operator@aether:~$</span>
            <input type="text" id="answer-input" autocomplete="off" spellcheck="false" autofocus>
        </section>
    </main>

    <script src="js/levels.js"></script>
    <script src="js/puzzles.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

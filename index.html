<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>25 Layers of Computer Science</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card" id="gameCard">

    <h1>🧠 25 Layers of CSE</h1>

    <h2 id="levelTitle"></h2>

    <div class="riddle" id="riddleText"></div>

    <input
      type="password"
      id="answerInput"
      placeholder="Enter password..."
      autocomplete="off"
    />

    <button id="submitBtn">Unlock Next Layer</button>

    <div id="message"></div>

    <div class="hint" id="hintBox"></div>

    <div class="progress" id="progressText"></div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
